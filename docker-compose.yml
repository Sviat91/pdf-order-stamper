services:
  backend:
    build: ./backend
    env_file: ./backend/.env
    volumes:
      - uploads:/app/uploads
    networks:
      - internal
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "8080:80"
    networks:
      - internal
    depends_on:
      - backend
    restart: unless-stopped

networks:
  internal:
    driver: bridge

volumes:
  uploads:
